# Registre des seuils — v0.1 (statut : PROVISOIRES, à valider au backtest P7)
# Toute modification : tracer ancienne valeur, nouvelle valeur, raison, date.
version: "0.1"
date: "2026-07-07"

filtres_exclusion:
  retards_publication: { defauts_max: 2, fenetre_echeances: 4 }  # PREVU_NON_IMPLEMENTE — meme dependance que silence_informationnel_mois
  silence_informationnel_mois: 18  # PREVU_NON_IMPLEMENTE — necessite un historique de publication par titre (chantier calendrier, non fait)
  resultat_net_negatif_exercices: 2
  payout_max: 1.00
  payout_max_exercices: 2
  de_ratio_multiple_median_sectoriel: 2.0   # hors banques
  solvabilite_bancaire_min: 0.115           # BCEAO — vérifier taux en vigueur
  suspension_lookback_mois: 12  # PREVU_NON_IMPLEMENTE — necessite une source structuree des suspensions (actuellement note en texte libre dans avis_reglementaires.note)
  sanction_lookback_mois: 24  # PREVU_NON_IMPLEMENTE — aucune source de sanctions CREPMF collectee a ce jour

score:
  poids: { rentabilite: 0.35, solidite: 0.30, valorisation: 0.35 }
  payout_sain: { min: 0.30, max: 0.70 }
  dividende_regulier_annees: 5
  recul_max: { malus_des: 0.10, vigilance: 0.25 }
  peg_attractif_max: 1.0
  croissance_lookback_annees: 3

# ------------------------------------------------------------------
# Registre des seuils SIGNAUX (chantier 1, 13/07/2026) — rapatries ici
# depuis moteur/signaux.py le 14/07/2026 (ils y etaient codes en dur,
# violation de la doctrine de versionnement ; corrige).
signaux:
  seuil_decote: 0.70              # PER < 70% de la mediane sectorielle -> A_QUALITE_DECOTEE
  seuil_chute_rn: 0.30            # recul du RN >= 30% (2 exercices positifs) -> D2
  seuil_rerating_acheve: 1.30     # PER > 130% de la mediane -> sortie RERATING_EN_COURS
  expiration_b1_bulletins: 2      # bulletins mensuels sans nouveau record -> extinction B1
  fenetre_heritage_retroactif_seances: 15   # heritage des signaux B a la qualification A (non encore implemente)

# Registre des seuils PROFILS (rapatries le 14/07/2026, memes raisons)
profils:
  fenetre_exercices_max: 4        # nombre max d'exercices beneficiaires consecutifs regardes
  seuil_mixite_pts: 20            # ecart de points sous lequel un profil est dit "mixte"
  confiance_haute_min_exercices: 4
  confiance_moyenne_min_exercices: 2
  alerte_peg_plausibilite_max: 0.20   # PEG sous ce seuil -> alerte de plausibilite (effet de base)

# ------------------------------------------------------------------
# Etat d'application des regles ci-dessous (audit du 14/07/2026) :
# 4 cles etaient documentees ici sans etre lues par AUCUN script
# (securite theatrale). Deux sont maintenant appliquees (voir moteur/tester.py,
# fonctions verifier_plausibilite / verifier_statut_ocr). Les autres sont
# explicitement marquees PREVU_NON_IMPLEMENTE ci-dessous : elles decrivent
# une intention de conception, pas un comportement actif du systeme.

# ------------------------------------------------------------------
# Registre CALENDRIER (chantier D4 automatique, 14/07/2026)
# Detection de retard par ecart a l'intervalle historique typique entre
# deux depots (pas d'hypothese sur les echeances reglementaires, seulement
# le rythme reel observe pour ce titre et cette categorie de document).
calendrier:
  min_occurrences: 3          # sous ce seuil, l'intervalle "typique" est trop instable pour etre fiable (cf. CIEC, decouvert au test)
  categories_exclues: ["autre", "rapport_cac"]  # "autre" = fourre-tout ; rapport_cac trop irregulierement depose seul (souvent groupe avec etats_financiers)
  intervalle_min_jours: 60    # sous ce seuil, l'historique est trop rapproche pour etre un cycle periodique reel
  intervalle_max_jours: 450   # au-dela, ce n'est plus un cycle regulier identifiable
  tolerance_courte_jours: 45  # categories a cycle < 200j (trimestriel, semestriel)
  tolerance_longue_jours: 60  # categories a cycle >= 200j (annuel) : plus de variance naturelle (AG, auditeurs)

# ------------------------------------------------------------------
# Delais reglementaires CREPMF (chantier "echeance reglementaire", 15/07/2026)
# Source : note CREPMF reprise par Sikafinance le 09/03/2020
# (https://www.sikafinance.com/marches/brvm-les-societes-cotees-tenues-de-respecter-les-delais-de-publication-des-resultats-sous-peine-de-sanction_21117),
# elle-meme renvoyant au BOC officiel du 28/02/2020 (bfin.brvm.org/boc/BOC_JOUR/BOC_20200228.pdf).
# Hypothese retenue : exercice social cale sur l'annee civile (cas de la quasi-
# totalite des emetteurs BRVM observes) -- si un titre a un exercice decale,
# ces dates seraient a corriger au cas par cas (non detecte automatiquement
# aujourd'hui, limite assumee).
delais_reglementaires:
  etats_financiers:  {mois: 4, jour: 30, decalage_annee: 1}  # exercice N publie au plus tard le 30/04 de N+1
  activite_T1:       {mois: 4, jour: 30, decalage_annee: 0}
  activite_T3:       {mois: 10, jour: 31, decalage_annee: 0}
  activite_S1:       {mois: 10, jour: 31, decalage_annee: 0}  # meme echeance que T3 -- source confirmee, pas une erreur de saisie
  # rapport_cac deliberement absent : sa vraie echeance depend de la date de
  # l'AGO (15j avant / republication 45j apres), qui varie par titre et n'est
  # pas fiablement connue ici -- l'exclure plutot que de deviner une date.

# ------------------------------------------------------------------
# Fraicheur des FONDAMENTAUX (chantier "second indicateur", 15/07/2026)
# Distinct de la fraicheur des COURS (deja existante, scoring.py::rapport_fraicheur).
# Mesure l'age du document le PLUS RECENT, toutes categories confondues (y
# compris celles exclues de D4/echeance reglementaire pour irregularite) --
# jamais une echeance precise, seulement "de quand date la meilleure info
# dont on dispose sur ce titre". Sert au signal D5_INFO_PERIMEE, INDEPENDANT
# de D4 : les deux ne s'influencent jamais l'un l'autre (D4 reste un fait de
# gouvernance permanent, jamais adouci par un document d'une autre categorie).
fraicheur_fondamentaux:
  seuil_perimee_jours: 365  # un cycle annuel complet sans AUCUN depot, toutes categories confondues

# ------------------------------------------------------------------
# Portefeuille reel (Vue 1, 16/07/2026) : SEUL le SEUIL est public --
# les positions elles-memes vivent dans config/portefeuille.yaml, qui
# n'est JAMAIS committe (voir .gitignore). Regle de reequilibrage :
# symetrique de l'escalade deja en place pour les signaux defavorables
# ("deux signaux simultanes = revue obligatoire") -- ici, "une position
# trop concentree = revue obligatoire", pas une vente automatique.
portefeuille:
  seuil_reequilibrage_pct_poche: 20  # une position > 20% de la poche actions -> revue au journal

extraction:
  plafond_plausibilite_fcfa: 1000000000000  # 1 000 Mds FCFA — APPLIQUE (moteur/tester.py) AU SEUL RESULTAT_NET (pas au bilan : total_actif/capitaux_propres de groupes bancaires panafricains le depassent legitimement — decouvert au 1er run reel, 14/07/2026)
  statut_ocr_max_sans_2e_source: "PROBABLE"  # APPLIQUE (moteur/tester.py::verifier_statut_ocr)

collecte:
  requetes_par_seconde_max: 2
  cibles: ["boc_fin_de_mois", "avis", "rapports_financiers"]
