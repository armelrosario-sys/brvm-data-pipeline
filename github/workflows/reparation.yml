name: P2c - Reparation des fichiers manquants
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reparation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests==2.32.3
      - name: Reparation
        run: python collecte/reparer_releases.py
      - name: Publication vers les Releases
        if: always()
        run: |
          if [ -f a_uploader.txt ]; then
            cut -f1 a_uploader.txt | sort -u | while read tag; do
              if ! gh release view "$tag" >/dev/null 2>&1; then
                gh release create "$tag" --title "$tag" \
                  --notes "Archives collectees automatiquement (source: brvm.org)"
                sleep 5
              fi
              grep -P "^$tag\t" a_uploader.txt | cut -f2 | while read f; do
                gh release upload "$tag" "$f" --clobber || \
                  echo "ECHEC upload: $f (tag $tag)" >> echecs_upload.txt
              done
            done
          fi
      - name: Verification post-publication
        if: always()
        run: python3 collecte/verifier_releases.py
      - name: Commit des resultats
        if: always()
        run: |
          git config user.name "robot-reparation"
          git config user.email "robot@users.noreply.github.com"
          git add collecte/a_reteleverser.json collecte/anomalies_integrite.json || true
          git commit -m "Reparation $(date -u +%F)" || echo "rien a committer"
          git pull --rebase origin main
          git push
