name: P4 - Golden tests du moteur
on:
  push:
    paths:
      - 'moteur/**'
      - 'config/**'
      - 'collecte/**'
      - 'dashboard/**'
  workflow_dispatch:

jobs:
  golden-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.2 openpyxl==3.1.5
      - name: Peupler, charger cours, rejouer golden tests
        run: |
          cd moteur
          python3 peupler.py
          python3 ../collecte/charger_cours.py brvm.db
          python3 tester.py
      - name: Generer le dashboard (test de fumee)
        run: python3 dashboard/generer_dashboard.py
