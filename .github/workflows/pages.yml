name: P5b - Publication dashboard GitHub Pages
on:
  push:
    paths:
      - 'moteur/**'
      - 'config/**'
      - 'collecte/**'
      - 'dashboard/**'
  # Ajoute le 15/07/2026 : un push effectue par un AUTRE workflow via le
  # jeton automatique GITHUB_TOKEN (ex. P9 - Collecte quotidienne) ne
  # declenche JAMAIS un autre workflow par "push", meme si le chemin
  # correspond -- protection anti-boucle infinie de GitHub, indocumentee
  # dans notre config mais bien reelle (constat direct : P9 reussi, aucune
  # republication automatique du dashboard, relance manuelle necessaire).
  # workflow_run n'est PAS soumis a cette restriction : il se declenche
  # quel que soit le jeton utilise par le workflow surveille.
  workflow_run:
    workflows: ["P9 - Collecte quotidienne des cours", "P11 - Collecte quotidienne du BOC (PER a jour)"]
    types: [completed]
  schedule:
    - cron: "30 3 * * 1,4"   # juste apres la collecte BOC (lundi/jeudi)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publier:
    # Correctif 17/07/2026 : la condition "if: ... conclusion == 'success'"
    # provoquait des runs IGNORES (icone grise) deroutants, pour un risque
    # qui n'existe pas vraiment -- si P9 echoue reellement, rien de nouveau
    # n'est committe, et P5b republie alors simplement les memes donnees
    # qu'avant (sans danger). Retiree : plus simple, moins de confusion,
    # aucune perte reelle de securite.
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.2
      - name: Peupler la base et charger les cours
        run: |
          cd moteur
          python3 peupler.py
          python3 ../collecte/charger_cours.py brvm.db
      - name: Calculer le calendrier des publications
        run: |
          cd moteur
          python3 calendrier.py
      - name: Calculer les signaux (cycle de vie)
        run: |
          cd moteur
          python3 signaux.py
      - name: Calculer les profils de style (VALUE/GROWTH/GARP)
        run: |
          cd moteur
          python3 profils.py
      - name: Generer le dashboard HTML
        run: python3 dashboard/generer_dashboard_html.py
      - name: Injecter les blocs signaux (liste de suivi + marche)
        run: python3 dashboard/bloc_signaux.py
      - name: Generer le poste de decision
        run: python3 dashboard/generer_poste_decision.py
      - name: Configurer Pages
        uses: actions/configure-pages@v5
      - name: Preparer l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs_site
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
