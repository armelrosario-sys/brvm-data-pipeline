name: P5b - Publication dashboard GitHub Pages
on:
  push:
    paths:
      - 'moteur/**'
      - 'config/**'
      - 'collecte/**'
      - 'dashboard/**'
  schedule:
    - cron: "30 3 * * 1,4"   # juste apres la collecte BOC (lundi/jeudi)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publier:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml==6.0.2
      - name: Peupler la base et charger les cours
        run: |
          cd moteur
          python3 peupler.py
          python3 ../collecte/charger_cours.py brvm.db
      - name: Generer le dashboard HTML
        run: python3 dashboard/generer_dashboard_html.py
      - name: Configurer Pages
        uses: actions/configure-pages@v5
      - name: Preparer l'artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs_site
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
