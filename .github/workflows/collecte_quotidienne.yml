name: P9 - Collecte quotidienne des cours

# Cree le 15/07/2026 : collecte/collecte_liquidite_jour.py existait deja
# (ecrit le 12/07/2026) mais n'etait appele par AUCUN workflow -- constat
# direct de l'utilisateur (les "plus-haut" affiches restaient figes sur le
# bulletin mensuel alors que le cours en direct avait largement bouge).
# Ce fichier corrige cet oubli : execution quotidienne (jours ouvres BRVM
# uniquement, lundi-vendredi), apres cloture officielle + delai de
# publication (17h00 UTC, marge de securite vs les ~15h-16h45 observes).

on:
  workflow_dispatch:
    inputs:
      forcer_malgre_seance_ouverte:
        description: "Forcer la collecte meme si la seance BRVM est encore ouverte (instantane partiel, marque comme tel, jamais confondu avec une vraie cloture)"
        type: boolean
        default: false
  schedule:
    - cron: "0 17 * * 1-5"   # 17h00 UTC, du lundi au vendredi -- toujours en mode strict

permissions:
  contents: write

jobs:
  collecte-quotidienne:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests beautifulsoup4
      - name: Collecter les cours du jour (brvm.org/fr/cours-actions/0)
        env:
          # Actif UNIQUEMENT sur declenchement manuel explicite avec la case
          # cochee (16/07/2026) -- jamais sur le declenchement programme,
          # qui reste toujours strict (protege le releve quotidien officiel).
          FORCER_MALGRE_SEANCE_OUVERTE: ${{ github.event_name == 'workflow_dispatch' && inputs.forcer_malgre_seance_ouverte && '1' || '' }}
        run: python3 collecte/collecte_liquidite_jour.py
      - name: Committer si changement
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Correctif 16/07/2026 : historique_liquidite.json (mediane
          # glissante SNTS, moteur/scoring.py::mediane_liquidite_historique)
          # etait cree par le script mais jamais committe -- perdu a chaque
          # execution depuis sa creation. Le "git add" n'incluait que
          # liquidite_jour.json. Trouve lors d'un audit complet des flux,
          # jamais detecte par les tests locaux (qui simulent le fichier,
          # jamais le vrai commit du workflow).
          #
          # 2e correctif, meme jour : si la seance est encore OUVERTE au
          # moment du run, collecte_liquidite_jour.py s'arrete plus tot et
          # n'ecrit RIEN (aucun des deux fichiers) -- un "git add" strict
          # plantait alors sur un chemin totalement absent (jamais commite
          # avant). On verifie l'existence de chaque fichier avant de
          # l'ajouter, plutot que de supposer qu'il existe toujours.
          [ -f collecte/liquidite_jour.json ] && git add collecte/liquidite_jour.json
          [ -f collecte/historique_liquidite.json ] && git add collecte/historique_liquidite.json
          git commit -m "Cours du jour $(date -u +%F)" || echo "rien a committer"
          git pull --rebase origin main
          git push
